<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Productos con JWT</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="container mt-5">
      <!-- SECCIÓN LOGIN (visible al inicio) -->
      <div id="loginSection" class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">🔐 Iniciar Sesión</h5>
            </div>
            <div class="card-body">
              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">Usuario</label>
                  <input
                    type="text"
                    class="form-control"
                    id="loginUsername"
                    placeholder="admin"
                    required
                    value="admin"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control"
                    id="loginPassword"
                    placeholder="••••••••"
                    required
                    value="admin123"
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Iniciar Sesión
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- SECCIÓN CRUD (visible solo después de login) -->
      <div id="crudSection" style="display: none">
        <h1 class="text-center mb-4">Gestión de Productos</h1>

        <!-- Formulario -->
        <div class="card mb-4">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Formulario de Productos</h5>
          </div>
          <div class="card-body">
            <form id="productForm">
              <input type="hidden" id="productId" />
              <div class="row g-3">
                <div class="col-md-3">
                  <label class="form-label">Código</label>
                  <input
                    type="text"
                    class="form-control"
                    id="codigo"
                    placeholder="Ej: P001"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Producto</label>
                  <input
                    type="text"
                    class="form-control"
                    id="producto"
                    placeholder="Nombre del producto"
                    required
                  />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Precio</label>
                  <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    id="precio"
                    placeholder="0.00"
                    required
                    min="0"
                  />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Cantidad</label>
                  <input
                    type="number"
                    class="form-control"
                    id="cantidad"
                    placeholder="1"
                    required
                    min="1"
                  />
                </div>
                <div class="col-md-2 d-flex align-items-end">
                  <button
                    type="submit"
                    class="btn btn-primary w-100"
                    id="btnGuardar"
                  >
                    Guardar
                  </button>
                  <button
                    type="button"
                    class="btn btn-secondary w-100 mt-1 d-none"
                    id="btnCancelar"
                  >
                    Cancelar
                  </button>
                  <button
                    type="button"
                    class="btn btn-danger w-100 mt-1"
                    id="btnLogout"
                  >
                    Cerrar Sesión
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>

        <!-- ============================================ -->
        <!-- 🔍 BARRA DE BÚSQUEDA                        -->
        <!-- ============================================ -->
        <div class="card mb-3">
          <div class="card-body">
            <div class="row g-2 align-items-center">
              <div class="col-md-6">
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control"
                    id="buscarInput"
                    placeholder="🔍 Buscar por ID, código o nombre..."
                    aria-label="Buscar productos"
                  />
                  <button class="btn btn-primary" id="btnBuscar" type="button">
                    Buscar
                  </button>
                  <button
                    class="btn btn-secondary d-none"
                    id="btnLimpiarBusqueda"
                    type="button"
                  >
                    ✕ Limpiar
                  </button>
                </div>
              </div>
              <div class="col-md-3">
                <button
                  class="btn btn-success w-100"
                  id="btnRecargar"
                  type="button"
                >
                  🔄 Recargar todos
                </button>
              </div>
              <div class="col-md-3 text-end">
                <span id="contadorProductos" class="badge bg-dark fs-6 p-2">
                  Cargando...
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Tabla de productos -->
        <div class="card">
          <div
            class="card-header bg-success text-white d-flex justify-content-between align-items-center"
          >
            <h5 class="mb-0">📋 Lista de Productos</h5>
            <span id="contadorProductosHeader" class="badge bg-light text-dark">
              Cargando...
            </span>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered table-striped table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tablaProductos">
                  <!-- Los productos se cargan dinámicamente -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
